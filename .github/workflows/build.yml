name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Download Gradle Wrapper JAR
      working-directory: AlwaysDisplay/gradle/wrapper
      run: |
        curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.11.1/gradle/wrapper/gradle-wrapper.jar" -o gradle-wrapper.jar

    - name: Make gradlew executable
      working-directory: AlwaysDisplay
      run: chmod +x gradlew

    - name: Build Debug APK
      working-directory: AlwaysDisplay
      run: ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: AlwaysDisplay/app/build/outputs/apk/debug/*.apk
