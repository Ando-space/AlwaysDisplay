name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Download Gradle and generate wrapper
      working-directory: AlwaysDisplay
      run: |
        curl -sL "https://services.gradle.org/distributions/gradle-8.11.1-bin.zip" -o /tmp/gradle.zip
        unzip -q /tmp/gradle.zip -d /opt/
        export PATH="/opt/gradle-8.11.1/bin:$PATH"
        gradle wrapper --gradle-version 8.11.1
        chmod +x gradlew

    - name: Build Debug APK
      working-directory: AlwaysDisplay
      run: ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: app-debug
        path: AlwaysDisplay/app/build/outputs/apk/debug/*.apk
