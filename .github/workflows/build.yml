name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Create gradle wrapper jar
      working-directory: AlwaysDisplay
      run: |
        mkdir -p gradle/wrapper
        cat > build_gradle_wrapper.sh << 'SCRIPT'
        # Download gradle wrapper jar
        GRADLE_VERSION=8.11.1
        wget -q "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -O /tmp/gradle.zip
        unzip -q /tmp/gradle.zip -d /tmp/
        /tmp/gradle-${GRADLE_VERSION}/bin/gradle wrapper --gradle-version ${GRADLE_VERSION}
        SCRIPT
        chmod +x build_gradle_wrapper.sh
        bash build_gradle_wrapper.sh

    - name: Build Debug APK
      working-directory: AlwaysDisplay
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: AlwaysDisplay/app/build/outputs/apk/debug/*.apk
