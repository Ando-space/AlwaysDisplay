name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Generate Gradle Wrapper
      working-directory: AlwaysDisplay
      run: |
        # 下载Gradle并生成wrapper
        curl -sL "https://services.gradle.org/distributions/gradle-8.11.1-bin.zip" -o /tmp/gradle.zip
        unzip -q /tmp/gradle.zip -d /opt/
        /opt/gradle-8.11.1/bin/gradle wrapper --gradle-version 8.11.1

    - name: Build Debug APK
      working-directory: AlwaysDisplay
      run: ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: AlwaysDisplay/app/build/outputs/apk/debug/*.apk
