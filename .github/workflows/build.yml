name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      run: |
        git clone --depth 1 https://github.com/Ando-space/AlwaysDisplay.git .

    - name: Install JDK 17
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq openjdk-17-jdk-headless
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
        echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

    - name: Install Android SDK
      run: |
        mkdir -p $HOME/android-sdk/latest/cmdline-tools
        cd /tmp
        curl -sL "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -o cmdline.zip
        unzip -q cmdline.zip
        mv cmdline-tools $HOME/android-sdk/latest/cmdline-tools/latest
        echo "ANDROID_HOME=$HOME/android-sdk/latest" >> $GITHUB_ENV
        echo "$HOME/android-sdk/latest/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "$HOME/android-sdk/latest/platform-tools" >> $GITHUB_PATH
        yes | sdkmanager --licenses > /dev/null 2>&1 || true
        sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools" > /dev/null 2>&1

    - name: Download Gradle
      run: |
        curl -sL "https://services.gradle.org/distributions/gradle-8.11.1-bin.zip" -o /tmp/gradle.zip
        unzip -q /tmp/gradle.zip -d /opt/
        echo "/opt/gradle-8.11.1/bin" >> $GITHUB_PATH

    - name: Generate Gradle Wrapper
      working-directory: AlwaysDisplay
      run: |
        gradle wrapper --gradle-version 8.11.1
        chmod +x gradlew

    - name: Build Debug APK
      working-directory: AlwaysDisplay
      run: ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Upload APK as Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        APK_PATH="AlwaysDisplay/app/build/outputs/apk/debug/app-debug.apk"
        if [ -f "$APK_PATH" ]; then
          TAG="v2.0-build-${{ github.run_number }}"
          gh release create "$TAG" "$APK_PATH" \
            --repo Ando-space/AlwaysDisplay \
            --title "Always Display Build #${{ github.run_number }}" \
            --notes "自动编译版本"
        else
          echo "APK not found!"
          find AlwaysDisplay/app/build -name "*.apk" 2>/dev/null
          exit 1
        fi
